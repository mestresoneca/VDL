<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platinum Band — Virtual Darts League</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='46' fill='%230E2A1E' stroke='%23D4A437' stroke-width='5'/%3E%3Ccircle cx='50' cy='50' r='26' fill='%23C8102E'/%3E%3Ccircle cx='50' cy='50' r='9' fill='%23D4A437'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E2A1E;
    --bg-deep:#081A12;
    --panel:#143626;
    --panel-alt:#1A4430;
    --line:#2A5440;
    --line-soft:#1F4634;
    --text:#F5F1E6;
    --text-muted:#9FB8AA;
    --gold:#D4A437;
    --gold-soft:#E8C766;
    --red:#C8102E;
    --silver:#C7D2CE;
    --bronze:#C58A52;
    --radius:10px;
    --shadow: 0 10px 30px rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(212,164,55,0.08), transparent 60%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px),
      var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans', system-ui, sans-serif;
    min-height:100vh;
  }
  a{color:var(--gold-soft);}
  ::selection{background:var(--gold); color:#0E2A1E;}
  :focus-visible{outline:2px solid var(--gold-soft); outline-offset:2px;}

  .wrap{max-width:1180px; margin:0 auto; padding:28px 20px 60px;}

  /* ---------- Header ---------- */
  header.top{
    display:flex; align-items:flex-start; justify-content:space-between; gap:20px;
    margin-bottom:18px;
  }
  .brand{display:flex; align-items:center; gap:14px;}
  .brand svg{width:46px; height:46px; flex-shrink:0;}
  .brand .titles{display:flex; flex-direction:column;}
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--gold-soft); margin:0 0 2px;
  }
  h1{
    font-family:'Teko', sans-serif; font-weight:700;
    font-size:38px; line-height:1; margin:0; letter-spacing:.01em;
    color:var(--text);
  }
  .langtoggle{
    display:flex; border:1px solid var(--line); border-radius:999px; overflow:hidden;
    background:var(--panel); flex-shrink:0; margin-top:4px;
  }
  .langtoggle button{
    font-family:'IBM Plex Mono', monospace; font-size:12px; font-weight:600;
    letter-spacing:.05em; padding:8px 14px; border:none; background:transparent;
    color:var(--text-muted); cursor:pointer; transition:background .15s, color .15s;
  }
  .langtoggle button.active{background:var(--gold); color:#1c1305;}

  .oche{
    display:flex; align-items:center; gap:10px; margin:14px 0 22px;
    color:var(--text-muted); font-family:'IBM Plex Mono', monospace; font-size:11px;
    letter-spacing:.15em; text-transform:uppercase;
  }
  .oche::before, .oche::after{
    content:""; flex:1; height:0; border-top:2px dashed var(--line);
  }

  /* ---------- Division tabs ---------- */
  .divisions{
    display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:18px;
    scrollbar-width:thin;
  }
  .divisions::-webkit-scrollbar{height:6px;}
  .divisions::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px;}
  .divtab{
    flex-shrink:0; font-family:'IBM Plex Mono', monospace; font-size:13px; font-weight:600;
    letter-spacing:.04em; padding:9px 16px; border-radius:7px;
    background:var(--panel); border:1px solid var(--line); color:var(--text-muted);
    cursor:pointer; transition:border-color .15s, color .15s, background .15s;
    position:relative;
  }
  .divtab:hover{color:var(--text); border-color:var(--gold-soft);}
  .divtab.active{
    background:var(--panel-alt); color:var(--gold-soft); border-color:var(--gold);
  }
  .divtab.active::after{
    content:""; position:absolute; left:14px; right:14px; bottom:-7px; height:2px;
    background:var(--gold);
  }

  /* ---------- Panel / Table ---------- */
  .panel{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); overflow:hidden;
  }
  .panel-head{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:14px 18px; border-bottom:1px solid var(--line); flex-wrap:wrap;
  }
  .division-name{
    font-family:'Teko', sans-serif; font-size:24px; font-weight:600; color:var(--text);
    letter-spacing:.01em;
  }
  .meta-row{display:flex; align-items:center; gap:14px; font-size:12px; color:var(--text-muted);}
  .refresh-btn{
    display:inline-flex; align-items:center; gap:6px;
    font-family:'IBM Plex Mono', monospace; font-size:12px; font-weight:600;
    color:var(--text-muted); background:transparent; border:1px solid var(--line);
    border-radius:6px; padding:6px 10px; cursor:pointer; transition:all .15s;
  }
  .refresh-btn:hover{color:var(--gold-soft); border-color:var(--gold-soft);}
  .refresh-btn svg{width:13px; height:13px;}
  .refresh-btn.spinning svg{animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .table-scroll{overflow-x:auto;}
  table{border-collapse:collapse; width:100%; min-width:980px;}
  thead th{
    position:sticky; top:0; background:var(--panel-alt); z-index:2;
    text-align:left; font-family:'IBM Plex Mono', monospace; font-size:11px;
    letter-spacing:.06em; text-transform:uppercase; color:var(--text-muted);
    padding:11px 12px; border-bottom:1px solid var(--line); cursor:pointer;
    white-space:nowrap; user-select:none; transition:color .15s;
  }
  thead th:hover{color:var(--gold-soft);}
  thead th.sorted{color:var(--gold-soft);}
  thead th .arrow{font-size:9px; margin-left:3px; opacity:.85;}
  thead th:first-child, tbody td:first-child{
    position:sticky; left:0; z-index:1; background:var(--panel-alt);
  }
  thead th:nth-child(2), tbody td:nth-child(2){
    position:sticky; left:54px; z-index:1;
  }
  tbody td:nth-child(2){background:var(--panel);}
  tbody tr:nth-child(even) td:nth-child(2){background:#123423;}

  tbody td{
    padding:10px 12px; border-bottom:1px solid var(--line-soft);
    font-family:'IBM Plex Mono', monospace; font-size:13px; color:var(--text);
    white-space:nowrap;
  }
  tbody td.player-cell{
    font-family:'IBM Plex Sans', sans-serif; font-weight:500; font-size:13.5px;
  }
  tbody tr:nth-child(even){background:rgba(255,255,255,0.015);}
  tbody tr:hover td{background:rgba(212,164,55,0.06);}
  tbody tr:hover td:first-child, tbody tr:hover td:nth-child(2){background:rgba(212,164,55,0.10);}

  td.num{text-align:right; font-variant-numeric:tabular-nums;}
  td.pts{color:var(--gold-soft); font-weight:600;}
  td.diff-pos{color:#8fd6a8;}
  td.diff-neg{color:#e08a8a;}
  td.highlight{color:var(--gold-soft); font-weight:600;}

  .rankbadge{
    display:inline-flex; align-items:center; justify-content:center;
    width:26px; height:26px; border-radius:50%; font-weight:700; font-size:12.5px;
    font-family:'IBM Plex Mono', monospace;
  }
  .rank-1{background:radial-gradient(circle at 35% 30%, #f3d27c, var(--gold)); color:#1c1305; box-shadow:0 0 0 2px rgba(212,164,55,.35);}
  .rank-2{background:radial-gradient(circle at 35% 30%, #e7ecea, var(--silver)); color:#1c1305;}
  .rank-3{background:radial-gradient(circle at 35% 30%, #dba56e, var(--bronze)); color:#241405;}
  .rank-n{background:transparent; color:var(--text-muted); border:1px solid var(--line);}

  /* ---------- States ---------- */
  .state-row td{
    text-align:center; padding:46px 20px; color:var(--text-muted);
    font-family:'IBM Plex Sans', sans-serif; font-size:14px;
  }
  .skeleton{
    height:14px; border-radius:4px; background:linear-gradient(90deg, var(--line-soft) 25%, var(--line) 37%, var(--line-soft) 63%);
    background-size:400% 100%; animation:shimmer 1.4s ease infinite;
  }
  @keyframes shimmer{0%{background-position:100% 0;}100%{background-position:0 0;}}

  footer{
    margin-top:22px; display:flex; justify-content:space-between; align-items:center;
    flex-wrap:wrap; gap:10px; font-size:12px; color:var(--text-muted);
    font-family:'IBM Plex Mono', monospace;
  }
  footer a{color:var(--text-muted); text-decoration:underline;}

  @media (max-width:680px){
    h1{font-size:30px;}
    .wrap{padding:18px 12px 40px;}
    table{min-width:760px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition:none !important;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="brand">
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="46" fill="#143626" stroke="#D4A437" stroke-width="5"/>
        <circle cx="50" cy="50" r="34" fill="none" stroke="#9FB8AA" stroke-width="1.5" opacity="0.5"/>
        <circle cx="50" cy="50" r="26" fill="#C8102E"/>
        <circle cx="50" cy="50" r="9" fill="#D4A437"/>
      </svg>
      <div class="titles">
        <p class="eyebrow" data-i18n="eyebrow">Virtual Darts League</p>
        <h1>Platinum Band</h1>
      </div>
    </div>
    <div class="langtoggle" role="group" aria-label="Language">
      <button id="lang-pt" class="active">PT</button>
      <button id="lang-en">EN</button>
    </div>
  </header>

  <div class="oche"><span data-i18n="ocheLabel">Linha de oche · classificações</span></div>

  <nav class="divisions" id="divisions" aria-label="Divisions"></nav>

  <section class="panel">
    <div class="panel-head">
      <span class="division-name" id="division-name">—</span>
      <div class="meta-row">
        <span id="updated-label">—</span>
        <button class="refresh-btn" id="refresh-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>
          <span data-i18n="refresh">Atualizar</span>
        </button>
      </div>
    </div>
    <div class="table-scroll">
      <table id="standings-table">
        <thead><tr id="table-head"></tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </section>

  <footer>
    <span id="footer-note">—</span>
    <a id="source-link" href="https://docs.google.com/spreadsheets/d/1yVALkrBiEvPGELeXbaAkpqTwX7GZ_m4mknhP17ys1k8/edit" target="_blank" rel="noopener">Google Sheets →</a>
  </footer>

</div>

<script>
(function(){
  "use strict";

  var SHEET_ID = "1yVALkrBiEvPGELeXbaAkpqTwX7GZ_m4mknhP17ys1k8";

  var DIVISIONS = [
    { sheet: "Platinum PL",   en: "Premier League", pt: "Liga Principal" },
    { sheet: "Platinum Div1", en: "Division 1",     pt: "Divisão 1" },
    { sheet: "Platinum Div2", en: "Division 2",     pt: "Divisão 2" },
    { sheet: "Platinum Div3", en: "Division 3",     pt: "Divisão 3" },
    { sheet: "Platinum Div4", en: "Division 4",     pt: "Divisão 4" },
    { sheet: "Platinum Div5", en: "Division 5",     pt: "Divisão 5" },
    { sheet: "Platinum Div6", en: "Division 6",     pt: "Divisão 6" },
    { sheet: "Platinum Div7", en: "Division 7",     pt: "Divisão 7" },
    { sheet: "Platinum Div8", en: "Division 8",     pt: "Divisão 8" },
    { sheet: "Platinum Div9", en: "Division 9",     pt: "Divisão 9" }
  ];

  // Column layout. idx = column index in the sheet (0-based, A=0).
  var COLUMNS = [
    { key:"pos",    idx:0,  en:"#",     pt:"#",     numeric:true,  title_en:"Position", title_pt:"Posição" },
    { key:"player", idx:1,  en:"Player",pt:"Jogador",numeric:false },
    { key:"p",      idx:2,  en:"P",     pt:"J",     numeric:true,  title_en:"Played",  title_pt:"Jogos" },
    { key:"w",      idx:3,  en:"W",     pt:"V",     numeric:true,  title_en:"Won",     title_pt:"Vitórias" },
    { key:"d",      idx:4,  en:"D",     pt:"E",     numeric:true,  title_en:"Drawn",   title_pt:"Empates" },
    { key:"l",      idx:5,  en:"L",     pt:"D",     numeric:true,  title_en:"Lost",    title_pt:"Derrotas" },
    { key:"f",      idx:6,  en:"F",     pt:"M",     numeric:true,  title_en:"Legs For",     title_pt:"Legs Marcados" },
    { key:"a",      idx:7,  en:"A",     pt:"S",     numeric:true,  title_en:"Legs Against",  title_pt:"Legs Sofridos" },
    { key:"diff",   idx:8,  en:"+/-",   pt:"+/-",   numeric:true,  title_en:"Leg Difference", title_pt:"Diferença de Legs" },
    { key:"pts",    idx:9,  en:"Pts",   pt:"Pts",   numeric:true,  title_en:"Points",  title_pt:"Pontos", isPts:true },
    { key:"avg",    idx:12, en:"Avg",   pt:"Média", numeric:true,  decimals:2, title_en:"Match average", title_pt:"Média de jogo" },
    { key:"first9", idx:13, en:"1st 9", pt:"1ªs 9", numeric:true,  decimals:2, title_en:"First 9 darts average", title_pt:"Média das primeiras 9 setas" },
    { key:"s60",    idx:14, en:"60+",   pt:"60+",   numeric:true,  title_en:"Scores 60–79", title_pt:"Acertos de 60 a 79" },
    { key:"s80",    idx:15, en:"80+",   pt:"80+",   numeric:true,  title_en:"Scores 80–99", title_pt:"Acertos de 80 a 99" },
    { key:"s100",   idx:16, en:"100+",  pt:"100+",  numeric:true,  title_en:"Scores 100–119", title_pt:"Acertos de 100 a 119" },
    { key:"s120",   idx:17, en:"120+",  pt:"120+",  numeric:true,  title_en:"Scores 120–139", title_pt:"Acertos de 120 a 139" },
    { key:"s140",   idx:18, en:"140+",  pt:"140+",  numeric:true,  title_en:"Scores 140–179", title_pt:"Acertos de 140 a 179" },
    { key:"t180",   idx:19, en:"180s",  pt:"180s",  numeric:true,  title_en:"Maximums (180)", title_pt:"Máximos (180)", isHot:true },
    { key:"hco",    idx:20, en:"H/Out", pt:"Fecho Máx.", numeric:true, title_en:"Highest checkout", title_pt:"Maior fecho de leg", isHot:true },
    { key:"bl",     idx:21, en:"Best Leg", pt:"Melhor Leg", numeric:true, title_en:"Best leg (fewest darts)", title_pt:"Melhor leg (menos setas)" }
  ];

  var I18N = {
    pt: {
      eyebrow: "Virtual Darts League",
      ocheLabel: "Linha de oche · classificações",
      refresh: "Atualizar",
      loading: "A carregar dados da folha de cálculo…",
      error: "Não foi possível carregar os dados desta divisão.",
      retry: "Tentar novamente",
      empty: "Ainda não há resultados nesta divisão.",
      updated: "Atualizado às",
      sourceTitle: "Ver folha original"
    },
    en: {
      eyebrow: "Virtual Darts League",
      ocheLabel: "Oche line · standings",
      refresh: "Refresh",
      loading: "Loading data from the spreadsheet…",
      error: "Couldn't load this division's data.",
      retry: "Try again",
      empty: "No results yet for this division.",
      updated: "Updated at",
      sourceTitle: "View original sheet"
    }
  };

  var state = {
    lang: "pt",
    activeIndex: 0,
    cache: {},          // sheet -> rows array
    loading: false
  };

  var els = {
    divisions: document.getElementById("divisions"),
    divisionName: document.getElementById("division-name"),
    updatedLabel: document.getElementById("updated-label"),
    refreshBtn: document.getElementById("refresh-btn"),
    tableHead: document.getElementById("table-head"),
    tableBody: document.getElementById("table-body"),
    footerNote: document.getElementById("footer-note"),
    langPt: document.getElementById("lang-pt"),
    langEn: document.getElementById("lang-en")
  };

  function t(key){ return I18N[state.lang][key]; }
  function colLabel(c){ return c[state.lang]; }
  function colTitle(c){ return c["title_" + state.lang] || colLabel(c); }
  function divLabel(d){ return d[state.lang]; }

  function buildDivisionTabs(){
    els.divisions.innerHTML = "";
    DIVISIONS.forEach(function(d, i){
      var btn = document.createElement("button");
      btn.className = "divtab" + (i === state.activeIndex ? " active" : "");
      btn.textContent = divLabel(d);
      btn.setAttribute("data-i", i);
      btn.addEventListener("click", function(){
        if (state.activeIndex === i) return;
        state.activeIndex = i;
        buildDivisionTabs();
        loadDivision(false);
      });
      els.divisions.appendChild(btn);
    });
  }

  function buildHead(){
    els.tableHead.innerHTML = "";
    COLUMNS.forEach(function(c){
      var th = document.createElement("th");
      th.textContent = colLabel(c);
      th.title = colTitle(c);
      th.style.cursor = "default";
      els.tableHead.appendChild(th);
    });
  }

  function gvizUrl(sheetName){
    return "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
      "/gviz/tq?tqx=out:json&sheet=" + encodeURIComponent(sheetName) + "&_=" + Date.now();
  }

  function parseGviz(text){
    var start = text.indexOf("{");
    var end = text.lastIndexOf("}");
    var json = JSON.parse(text.substring(start, end + 1));
    var rows = json.table.rows || [];
    var out = [];
    rows.forEach(function(r){
      var cells = r.c || [];
      var playerCell = cells[1];
      var playerVal = playerCell && playerCell.v != null ? String(playerCell.v).trim() : "";
      if (!playerVal) return; // skip blank rows
      var rec = {};
      COLUMNS.forEach(function(col){
        var cell = cells[col.idx];
        var v = cell ? cell.v : null;
        rec[col.key] = v;
      });
      out.push(rec);
    });
    return out;
  }

  function showSkeleton(){
    els.tableBody.innerHTML = "";
    for (var i = 0; i < 8; i++){
      var tr = document.createElement("tr");
      tr.className = "state-row";
      var td = document.createElement("td");
      td.colSpan = COLUMNS.length;
      var sk = document.createElement("div");
      sk.className = "skeleton";
      sk.style.maxWidth = (60 + Math.random()*30) + "%";
      sk.style.margin = "0 auto";
      td.appendChild(sk);
      tr.appendChild(td);
      els.tableBody.appendChild(tr);
    }
  }

  function showMessage(msg, withRetry){
    els.tableBody.innerHTML = "";
    var tr = document.createElement("tr");
    tr.className = "state-row";
    var td = document.createElement("td");
    td.colSpan = COLUMNS.length;
    td.textContent = msg;
    if (withRetry){
      var btn = document.createElement("button");
      btn.className = "refresh-btn";
      btn.style.marginTop = "12px";
      btn.style.display = "block";
      btn.style.marginLeft = "auto";
      btn.style.marginRight = "auto";
      btn.textContent = t("retry");
      btn.addEventListener("click", function(){ loadDivision(true); });
      td.appendChild(document.createElement("br"));
      td.appendChild(btn);
    }
    tr.appendChild(td);
    els.tableBody.appendChild(tr);
  }

  function fmtNumber(c, v){
    if (v === null || v === undefined || v === "") return "—";
    if (typeof v === "number" && c.decimals){
      return v.toFixed(c.decimals);
    }
    return String(v);
  }

  function renderRows(){
    var sheetName = DIVISIONS[state.activeIndex].sheet;
    var data = (state.cache[sheetName] || []).slice();

    els.tableBody.innerHTML = "";

    if (data.length === 0){
      showMessage(t("empty"), false);
      return;
    }

    data.forEach(function(row, i){
      var tr = document.createElement("tr");

      COLUMNS.forEach(function(c){
        var td = document.createElement("td");
        var val = row[c.key];

        if (c.key === "pos"){
          var rank = Number(row.pos) || (i + 1);
          var span = document.createElement("span");
          var rcls = rank === 1 ? "rank-1" : rank === 2 ? "rank-2" : rank === 3 ? "rank-3" : "rank-n";
          span.className = "rankbadge " + rcls;
          span.textContent = rank;
          td.appendChild(span);
        } else if (c.key === "player"){
          td.className = "player-cell";
          td.textContent = val || "—";
        } else if (c.key === "diff"){
          td.classList.add("num");
          var n = Number(val);
          if (!isNaN(n) && n > 0) td.classList.add("diff-pos");
          if (!isNaN(n) && n < 0) td.classList.add("diff-neg");
          td.textContent = (val === null || val === undefined || val === "") ? "—" : (n > 0 ? "+" + n : String(n));
        } else {
          td.classList.add("num");
          if (c.isPts) td.classList.add("pts");
          if (c.isHot && val) td.classList.add("highlight");
          td.textContent = fmtNumber(c, val);
        }
        tr.appendChild(td);
      });

      els.tableBody.appendChild(tr);
    });
  }

  function loadDivision(forceRefresh){
    var d = DIVISIONS[state.activeIndex];
    els.divisionName.textContent = divLabel(d);
    els.refreshBtn.classList.add("spinning");
    buildHead();

    if (!forceRefresh && state.cache[d.sheet]){
      renderRows();
      els.refreshBtn.classList.remove("spinning");
      return;
    }

    showSkeleton();

    fetch(gvizUrl(d.sheet), { cache: "no-store" })
      .then(function(res){
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.text();
      })
      .then(function(text){
        var rows = parseGviz(text);
        state.cache[d.sheet] = rows;
        renderRows();
        els.updatedLabel.textContent = t("updated") + " " + new Date().toLocaleTimeString(state.lang === "pt" ? "pt-PT" : "en-GB");
      })
      .catch(function(err){
        console.error(err);
        showMessage(t("error"), true);
      })
      .finally(function(){
        els.refreshBtn.classList.remove("spinning");
      });
  }

  function applyStaticI18n(){
    document.documentElement.lang = state.lang;
    document.querySelectorAll("[data-i18n]").forEach(function(el){
      var key = el.getAttribute("data-i18n");
      el.textContent = t(key);
    });
    els.langPt.classList.toggle("active", state.lang === "pt");
    els.langEn.classList.toggle("active", state.lang === "en");
    els.divisionName.textContent = divLabel(DIVISIONS[state.activeIndex]);
    els.footerNote.textContent = state.lang === "pt"
      ? "Dados sincronizados em direto a partir do Google Sheets."
      : "Data synced live from Google Sheets.";
    document.getElementById("source-link").title = t("sourceTitle");
  }

  function setLang(lang){
    if (state.lang === lang) return;
    state.lang = lang;
    applyStaticI18n();
    buildDivisionTabs();
    buildHead();
    renderRows();
  }

  els.langPt.addEventListener("click", function(){ setLang("pt"); });
  els.langEn.addEventListener("click", function(){ setLang("en"); });
  els.refreshBtn.addEventListener("click", function(){ loadDivision(true); });

  // init
  applyStaticI18n();
  buildDivisionTabs();
  buildHead();
  loadDivision(false);

})();
</script>
</body>
</html>
